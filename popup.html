<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>athine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #555;
      --bar-empty: #1e1e1e;
      --bar-fill: #d4d4d4;
      --bar-border: #3a3a3a;
      --tag-bg: #1e1e1e;
      --tag-border: #2f2f2f;
      --green: #7fff7a;
      --amber: #ffcc44;
    }

    html,
    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    .shell {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mute-all-btn {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 3px 7px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .mute-all-btn:hover {
      border-color: #444;
      color: var(--text);
    }

    .dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .dots span {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
    }

    /* ── Summary ── */
    .summary {
      display: flex;
      gap: 6px;
    }

    .summary-pill {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 9px;
      color: var(--muted);
    }

    .summary-pill.active {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── Tab list ── */
    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Tab card ── */
    .tab-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 9px 7px;
      transition: border-color 0.15s;
    }

    .tab-card:hover {
      border-color: #383838;
    }

    .tab-card.is-active-tab {
      border-left: 2px solid #444;
    }

    /* ── Top row: favicon + domain + title + vol% + mute ── */
    .tab-top {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }

    .favicon {
      width: 13px;
      height: 13px;
      border-radius: 2px;
      object-fit: contain;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .tab-domain {
      font-size: 8px;
      color: var(--muted);
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 2px;
      padding: 1px 4px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .tab-title {
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .tag-playing {
      font-size: 8px;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 2px;
      padding: 1px 4px;
      flex-shrink: 0;
    }

    .vol-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
      flex-shrink: 0;
      min-width: 30px;
      text-align: right;
    }

    .mute-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      color: var(--muted);
      padding: 0 1px;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }

    .mute-btn:hover {
      color: var(--amber);
    }

    .mute-btn.is-muted {
      color: var(--amber);
    }

    /* ── Bottom row: − bar + ── */
    .tab-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .vol-btn {
      width: 17px;
      height: 17px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.12s;
      user-select: none;
    }

    .vol-btn:hover {
      border-color: #555;
      color: var(--text);
      background: #222;
    }

    .vol-btn:active {
      transform: scale(0.9);
    }

    .bar-track {
      flex: 1;
      height: 13px;
      background: var(--bar-empty);
      border: 1px solid var(--bar-border);
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
    }

    .bar-fill {
      height: 100%;
      background: var(--bar-fill);
      border-radius: 2px 0 0 2px;
      pointer-events: none;
      position: relative;
      transition: width 0.07s ease;
    }

    /* shine on top */
    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: rgba(255, 255, 255, 0.1);
    }

    .bar-track:hover .bar-fill {
      background: #eaeaea;
    }

    .tab-card.is-muted .bar-fill {
      background: #3a3a3a;
    }

    .tab-card.is-muted .vol-label {
      color: var(--amber);
    }

    /* ── Empty / loading ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      padding: 28px 0;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 9px;
      padding: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="shell">

    <div class="header">
      <div class="header-left">
        <span class="logo">Athine</span>
        <span class="logo-sub">control vol</span>
      </div>
      <div class="header-right">
        <button class="mute-all-btn" id="muteAllBtn">mute all</button>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-pill" id="tabCountPill">— tabs</div>
      <div class="summary-pill active" id="playingPill" style="display:none">● playing</div>
    </div>

    <div class="tab-list" id="tabList">
      <div class="loading">scanning tabs…</div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>

</html>
